services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
        required: false
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    profiles: ["builtin-db"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-plain_blog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-plain_blog}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plain_blog} -d ${POSTGRES_DB:-plain_blog}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
